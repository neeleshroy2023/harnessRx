# Structured-extraction cases. Each provides a JSON Schema + expected fields.
- id: ext-001
  input:
    text: "Order #A-1029 placed by Jane Smith on 2026-02-14 for $129.99 (3 items)."
    schema:
      type: object
      required: [order_id, customer, date, total, item_count]
      properties:
        order_id: {type: string}
        customer: {type: string}
        date: {type: string}
        total: {type: number}
        item_count: {type: integer}
  expected:
    schema:
      type: object
      required: [order_id, customer, date, total, item_count]
      properties:
        order_id: {type: string}
        customer: {type: string}
        date: {type: string}
        total: {type: number}
        item_count: {type: integer}
    fields:
      order_id: "A-1029"
      customer: "Jane Smith"
      date: "2026-02-14"
      total: 129.99
      item_count: 3
    judge_rubric: "All five fields correct, types as in schema."

