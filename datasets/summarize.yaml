# Summarization eval cases. Each: input.text + expected.contains (must-mention facts) + judge_rubric.
- id: sum-001
  input:
    text: |
      In Q3 2025, Acme Corp reported revenue of $4.2 billion, up 18% year-over-year.
      CEO Jane Doe attributed the growth to strong demand for the company's new
      enterprise AI platform, which launched in June 2025.
  expected:
    contains: ["Acme", "$4.2 billion", "18%"]
    judge_rubric: "Summary must mention Acme, the $4.2B revenue, and the 18% YoY growth. No invented facts."
  tags: [finance, factual]

- id: sum-002
  input:
    text: |
      The James Webb Space Telescope detected the most distant galaxy ever observed,
      JADES-GS-z14-0, formed just 290 million years after the Big Bang. The galaxy
      is unusually bright, suggesting early universe star formation was more efficient
      than models predicted.
  expected:
    contains: ["JADES-GS-z14-0", "290 million"]
    judge_rubric: "Mentions the galaxy name and the 290M-year figure. Does not invent additional measurements."
  tags: [science]

